<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Visor 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0f12; font-family: -apple-system, system-ui, sans-serif; }

  #scene { width: 100%; height: 100%; touch-action: none; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 16px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    pointer-events: none;
  }
  .title {
    color: #e8e6e1;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .upload-zone {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    z-index: 20;
    background: #0d0f12;
    transition: opacity 0.4s ease;
  }
  .upload-zone.hidden { opacity: 0; pointer-events: none; }

  .upload-zone h1 {
    color: #e8e6e1;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .upload-zone p {
    color: #8a8f98;
    font-size: 14px;
    max-width: 320px;
    text-align: center;
    line-height: 1.5;
  }
  .upload-zone p strong { color: #d4a373; }

  .drop-card {
    border: 1.5px dashed #3a3e46;
    border-radius: 14px;
    padding: 36px 28px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #15171c;
  }
  .drop-card:active, .drop-card.drag {
    border-color: #d4a373;
    background: #1a1c22;
  }
  .drop-card span {
    display: block;
    color: #d4a373;
    font-size: 13px;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }
  input[type=file] { display: none; }

  .hud {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 18px 16px max(18px, env(safe-area-inset-bottom));
    display: flex; gap: 10px; justify-content: center;
    z-index: 10;
  }
  .btn {
    background: #15171c;
    border: 1px solid #2a2e36;
    color: #d4a373;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 100px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: #2a2e36; }

  .hint {
    position: fixed; top: 16px; left: 0; right: 0;
    text-align: center;
    color: #8a8f98;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 5;
    opacity: 0.7;
    transition: opacity 1s ease;
  }
  .hint.fade { opacity: 0; }

  .error {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #2a1a1a; color: #e8a0a0;
    padding: 10px 18px; border-radius: 10px;
    font-size: 12px; z-index: 30;
    max-width: 80%; text-align: center;
    border: 1px solid #4a2a2a;
  }
</style>
</head>
<body>

<div class="upload-zone" id="uploadZone">
  <h1>Tu modelo, desde cualquier ángulo</h1>
  <p>Sube tu archivo exportado como <strong>.glb</strong> o <strong>.gltf</strong> desde Blender (Archivo → Exportar → glTF 2.0)</p>
  <label class="drop-card" id="dropCard">
    📦
    <span>Tocar para elegir archivo</span>
    <input type="file" id="fileInput" accept=".glb,.gltf">
  </label>
</div>

<div class="hint" id="hint">Arrastra para girar · Pellizca para zoom</div>

<canvas id="scene"></canvas>

<div class="hud" id="hud" style="display:none">
  <button class="btn" id="resetBtn">Centrar vista</button>
  <button class="btn" id="wireBtn">Wireframe</button>
  <button class="btn" id="newBtn">Otro archivo</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, currentModel, wireframeOn = false;

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0f12);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(3, 2, 4);

  const canvas = document.getElementById('scene');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;

  // Iluminación tipo estudio
  const hemi = new THREE.HemisphereLight(0xfff4e6, 0x1a1a2a, 0.9);
  scene.add(hemi);

  const key = new THREE.DirectionalLight(0xfff4e6, 1.4);
  key.position.set(5, 8, 6);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xd4a373, 0.5);
  fill.position.set(-5, 2, -4);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0x6699ff, 0.4);
  rim.position.set(0, -3, -5);
  scene.add(rim);

  // Suelo sutil tipo grid
  const grid = new THREE.GridHelper(10, 20, 0x2a2e36, 0x1a1d22);
  scene.add(grid);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.rotateSpeed = 0.9;
  controls.zoomSpeed = 0.9;
  controls.panSpeed = 0.7;
  controls.minDistance = 0.05;
  controls.maxDistance = 100;

  window.addEventListener('resize', onResize);
  animate();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function frameModel(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  object.position.x -= center.x;
  object.position.y -= center.y;
  object.position.z -= center.z;

  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  let camDist = (maxDim / 2) / Math.tan(fov / 2);
  camDist *= 1.8;

  camera.position.set(camDist * 0.7, camDist * 0.5, camDist * 0.8);
  controls.target.set(0, 0, 0);
  controls.minDistance = maxDim * 0.02;
  controls.maxDistance = maxDim * 10;
  controls.update();

  // Ajustar grid al tamaño del modelo
  scene.children.forEach(c => {
    if (c.type === 'GridHelper') {
      c.scale.setScalar(maxDim / 10 * 2 || 1);
      c.position.y = box.min.y - center.y;
    }
  });
}

function loadModel(url) {
  const loader = new THREE.GLTFLoader();
  loader.load(url, (gltf) => {
    if (currentModel) scene.remove(currentModel);
    currentModel = gltf.scene;

    currentModel.traverse((child) => {
      if (child.isMesh && child.material) {
        child.material.envMapIntensity = 1;
      }
    });

    scene.add(currentModel);
    frameModel(currentModel);

    document.getElementById('uploadZone').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    setTimeout(() => document.getElementById('hint').classList.add('fade'), 4000);
  }, undefined, (err) => {
    showError('No se pudo cargar el modelo. Verifica que sea .glb o .gltf válido.');
    console.error(err);
  });
}

function showError(msg) {
  const e = document.createElement('div');
  e.className = 'error';
  e.textContent = msg;
  document.body.appendChild(e);
  setTimeout(() => e.remove(), 4000);
}

function handleFile(file) {
  if (!file) return;
  const name = file.name.toLowerCase();
  if (!name.endsWith('.glb') && !name.endsWith('.gltf')) {
    showError('Formato no soportado. Exporta tu modelo como .glb desde Blender.');
    return;
  }
  const url = URL.createObjectURL(file);
  loadModel(url);
}

document.getElementById('fileInput').addEventListener('change', (e) => {
  handleFile(e.target.files[0]);
});

const dropCard = document.getElementById('dropCard');
dropCard.addEventListener('dragover', (e) => { e.preventDefault(); dropCard.classList.add('drag'); });
dropCard.addEventListener('dragleave', () => dropCard.classList.remove('drag'));
dropCard.addEventListener('drop', (e) => {
  e.preventDefault();
  dropCard.classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (currentModel) frameModel(currentModel);
});

document.getElementById('wireBtn').addEventListener('click', () => {
  wireframeOn = !wireframeOn;
  if (currentModel) {
    currentModel.traverse((child) => {
      if (child.isMesh && child.material) {
        child.material.wireframe = wireframeOn;
      }
    });
  }
});

document.getElementById('newBtn').addEventListener('click', () => {
  document.getElementById('uploadZone').classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('hint').classList.remove('fade');
  document.getElementById('fileInput').value = '';
});

initScene();
</script>

</body>
</html>
